<div class="container">
  <div class="header">
    <h2>Vehículos</h2>
    <a routerLink="/vehicles/new" class="btn-primary">+ Nuevo vehículo</a>
  </div>

  <div *ngIf="loading">Cargando...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && vehicles.length > 0">
    <thead>
      <tr>
        <th>Placa</th>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Año</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let v of vehicles">
        <td>{{ v.placa }}</td>
        <td>{{ v.marca }}</td>
        <td>{{ v.modelo }}</td>
        <td>{{ v.anio }}</td>
        <td><span class="badge {{ v.estado }}">{{ v.estado }}</span></td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && vehicles.length === 0">No hay vehículos registrados.</div>
</div>
