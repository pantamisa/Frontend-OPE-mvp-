<div class="container">
  <div class="header">
    <h2>Conductores</h2>
    <a routerLink="/drivers/new" class="btn-primary">+ Nuevo conductor</a>
  </div>

  <div *ngIf="loading">Cargando...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && drivers.length > 0">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Licencia</th>
        <th>Teléfono</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let d of drivers">
        <td>{{ d.nombre }}</td>
        <td>{{ d.apellido }}</td>
        <td>{{ d.licencia }}</td>
        <td>{{ d.telefono }}</td>
        <td><span class="badge {{ d.estado }}">{{ d.estado }}</span></td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && drivers.length === 0">No hay conductores registrados.</div>
</div>
