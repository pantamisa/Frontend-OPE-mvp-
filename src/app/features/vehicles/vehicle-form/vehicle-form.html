<div class="container">
  <h2>Registrar Vehículo</h2>

  <div *ngIf="error" class="error">{{ error }}</div>

  <form (ngSubmit)="save()">
    <div class="form-group">
      <label>Placa</label>
      <input [(ngModel)]="vehicle.placa" name="placa" required />
    </div>
    <div class="form-group">
      <label>Marca</label>
      <input [(ngModel)]="vehicle.marca" name="marca" required />
    </div>
    <div class="form-group">
      <label>Modelo</label>
      <input [(ngModel)]="vehicle.modelo" name="modelo" required />
    </div>
    <div class="form-group">
      <label>Año</label>
      <input [(ngModel)]="vehicle.anio" name="anio" type="number" required />
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select [(ngModel)]="vehicle.estado" name="estado">
        <option value="disponible">Disponible</option>
        <option value="rentado">Rentado</option>
        <option value="mantenimiento">En mantenimiento</option>
      </select>
    </div>

    <div class="actions">
      <button type="button" routerLink="/vehicles">Cancelar</button>
      <button type="submit" [disabled]="saving">
        {{ saving ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
