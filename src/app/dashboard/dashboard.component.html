<div class="dashboard">
  <h1 class="page-title">Dashboard</h1>

  <div class="dashboard__body">

    <!-- ── CHART AREA ── -->
    <div class="chart-card">
      <p class="chart-card__title">Consumo por coches</p>
      <div class="chart-wrap">
        <canvas #chartCanvas></canvas>
      </div>
    </div>

    <!-- ── METRIC CARDS ── -->
    <div class="metrics">

      <div class="metric-card metric-card--red">
        <p class="metric-card__label">Consumo del mes</p>
        <p class="metric-card__value">{{ consumoMes }} KW</p>
      </div>

      <div class="metric-card metric-card--yellow">
        <p class="metric-card__label">Promedio Consumo Mes</p>
        <p class="metric-card__value">{{ promedioMes }} KW</p>
      </div>

      <div class="metric-card metric-card--green">
        <p class="metric-card__label">Promedio Consumo en vehiculos</p>
        <p class="metric-card__value">{{ promedioOficinas }} KW</p>
      </div>

    </div>
  </div>
</div>
