<div class="container">
  <h2>Registrar Conductor</h2>

  <div *ngIf="error" class="error">{{ error }}</div>

  <form (ngSubmit)="save()">
    <div class="form-group">
      <label>Nombre</label>
      <input [(ngModel)]="driver.nombre" name="nombre" required />
    </div>
    <div class="form-group">
      <label>Apellido</label>
      <input [(ngModel)]="driver.apellido" name="apellido" required />
    </div>
    <div class="form-group">
      <label>Licencia</label>
      <input [(ngModel)]="driver.licencia" name="licencia" required />
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input [(ngModel)]="driver.telefono" name="telefono" required />
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select [(ngModel)]="driver.estado" name="estado">
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>
    </div>

    <div class="actions">
      <button type="button" routerLink="/drivers">Cancelar</button>
      <button type="submit" [disabled]="saving">
        {{ saving ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
