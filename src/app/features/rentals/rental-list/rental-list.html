<div class="container">
  <div class="header">
    <h2>Rentas</h2>
    <a routerLink="/rentals/new" class="btn-primary">+ Nueva renta</a>
  </div>

  <div *ngIf="loading">Cargando...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && rentals.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Vehículo</th>
        <th>Conductor</th>
        <th>Fecha inicio</th>
        <th>Tarifa</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of rentals">
        <td>{{ r.id }}</td>
        <td>{{ r.vehiculo }}</td>
        <td>{{ r.conductor }}</td>
        <td>{{ r.fecha_inicio }}</td>
        <td>{{ r.tipo_tarifa }}</td>
        <td><span class="badge {{ r.estado }}">{{ r.estado }}</span></td>
        <td>
          <a [routerLink]="['/rentals', r.id]" class="btn-secondary">Ver detalle</a>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && rentals.length === 0">No hay rentas registradas.</div>
</div>
