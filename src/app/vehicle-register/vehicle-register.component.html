<div class="page">
  <h1 class="page-title">Registro de Vehículos</h1>

  <div class="toolbar">
    <div class="search-group">
      <span class="search-label">Buscar vehículo</span>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" [(ngModel)]="searchTerm" class="search-input" />
      </div>
    </div>
    <div class="action-btns">
      <button class="btn btn--green" (click)="openModal()">Añadir</button>
      <button class="btn btn--red" (click)="deleteSelected()">Eliminar</button>
    </div>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th></th>
          <th>Placa</th>
          <th>Marca</th>
          <th>Modelo</th>
          <th>Año</th>
          <th>Tipo</th>
          <th>km/L</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let v of filtered">
          <td>
            <label class="checkbox-wrap">
              <input type="checkbox" [(ngModel)]="v.checked" hidden />
              <span class="custom-check" [class.custom-check--active]="v.checked">
                <svg *ngIf="v.checked" width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#fff"
                  stroke-width="2.2">
                  <polyline points="1.5,6 4.5,9 10.5,3" />
                </svg>
              </span>
            </label>
          </td>
          <td class="td-bold">{{ v.plate }}</td>
          <td>{{ v.brand }}</td>
          <td>{{ v.model }}</td>
          <td>{{ v.year }}</td>
          <td>{{ v.type }}</td>
          <td>{{ v.kmPerLiter }}</td>
          <td><span class="badge" [ngClass]="statusClass(v.status)">{{ v.status }}</span></td>
        </tr>
      </tbody>
    </table>
    <p class="empty-state" *ngIf="filtered.length === 0">No se encontraron vehículos.</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2 class="modal__title">Registrar Vehículo</h2>
    <div class="modal__grid">
      <div class="modal__field">
        <label class="modal__label">Placa</label>
        <input type="text" [(ngModel)]="newVehicle.plate" class="modal__input" placeholder="ABC-123" />
      </div>
      <div class="modal__field">
        <label class="modal__label">Marca</label>
        <input type="text" [(ngModel)]="newVehicle.brand" class="modal__input" />
      </div>
      <div class="modal__field">
        <label class="modal__label">Modelo</label>
        <input type="text" [(ngModel)]="newVehicle.model" class="modal__input" />
      </div>
      <div class="modal__field">
        <label class="modal__label">Año</label>
        <input type="number" [(ngModel)]="newVehicle.year" class="modal__input" />
      </div>
      <div class="modal__field">
        <label class="modal__label">Tipo</label>
        <select [(ngModel)]="newVehicle.type" class="modal__select">
          <option *ngFor="let t of vehicleTypes" [value]="t">{{ t }}</option>
        </select>
      </div>
      <div class="modal__field">
        <label class="modal__label">Rendimiento (km/L)</label>
        <input type="number" [(ngModel)]="newVehicle.kmPerLiter" class="modal__input" />
      </div>
      <div class="modal__field">
        <label class="modal__label">Estado</label>
        <select [(ngModel)]="newVehicle.status" class="modal__select">
          <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>
    <div class="modal__actions">
      <button class="btn btn--gray" (click)="closeModal()">Cancelar</button>
      <button class="btn btn--green" (click)="saveVehicle()">Guardar</button>
    </div>
  </div>
</div>
