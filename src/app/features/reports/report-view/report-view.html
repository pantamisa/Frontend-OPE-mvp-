<div class="container">
  <h2>Reporte de Ingresos</h2>

  <div *ngIf="loading">Cargando...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="report && !loading">
    <div class="summary-cards">
      <div class="card">
        <span class="card-label">Total ingresos</span>
        <span class="card-value">$ {{ report.total_ingresos | number }}</span>
      </div>
      <div class="card">
        <span class="card-label">Total rentas</span>
        <span class="card-value">{{ report.total_rentas }}</span>
      </div>
    </div>

    <h3>Detalle por mes</h3>
    <table>
      <thead>
        <tr>
          <th>Mes</th>
          <th>Ingresos</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of report.detalle">
          <td>{{ d.mes }}</td>
          <td>$ {{ d.ingresos | number }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
