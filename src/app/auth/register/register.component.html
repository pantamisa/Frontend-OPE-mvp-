<div class="auth-page">

  <!-- Left: Logo -->
  <div class="logo-side">
    <img src="Logo%20grande.png" alt="OpE Logo" class="logo-img" />
  </div>

  <!-- Right: Form -->
  <div class="form-side">
    <div class="register-card">

      <h1 class="card-title">Sign Up</h1>
      <p class="card-subtitle">Join the OpE community!</p>

      <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="w-100 d-flex flex-column align-items-center">
        
        <!-- Username -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </span>
          <input 
            type="text" 
            formControlName="username" 
            placeholder="Username" 
            class="field-input"
            [class.is-invalid]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" />
        </div>
        <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="text-danger small mt-n2 mb-2 w-100 px-2">
          Usuario obligatorio (min. 4 car., sin car. especiales).
        </div>

        <!-- First Name -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 11c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z"></path>
              <path d="M12 13c-2.761 0-5 2.239-5 5v1h10v-1c0-2.761-2.239-5-5-5z"></path>
            </svg>
          </span>
          <input 
            type="text" 
            formControlName="firstName" 
            placeholder="First Name" 
            class="field-input"
            [class.is-invalid]="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched" />
        </div>

        <!-- Last Name -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </span>
          <input 
            type="text" 
            formControlName="lastName" 
            placeholder="Last Name" 
            class="field-input"
            [class.is-invalid]="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched" />
        </div>

        <!-- Email -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="M3 7l9 6 9-6" />
            </svg>
          </span>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="Email address" 
            class="field-input"
            [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" />
        </div>
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-danger small mt-n2 mb-2 w-100 px-2">
          Introduce un correo válido.
        </div>

        <!-- Phone -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z" />
            </svg>
          </span>
          <input 
            type="tel" 
            formControlName="phone" 
            placeholder="Phone number" 
            class="field-input"
            [class.is-invalid]="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" />
        </div>

        <!-- Password -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            formControlName="password" 
            placeholder="Password"
            class="field-input"
            [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" />
          <span class="input-icon-right" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </span>
        </div>
        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-danger small mt-n2 mb-2 w-100 px-2">
          La contraseña debe tener al menos 6 caracteres.
        </div>

        <button type="submit" class="btn-primary">Sign Up</button>
      </form>

      <div class="divider">
        <hr /><span>Or</span>
        <hr />
      </div>

      <p class="footer-text">
        Already have an account?
        <a routerLink="/login" class="link-accent">Sign In</a>
      </p>

    </div>
  </div>

</div>
