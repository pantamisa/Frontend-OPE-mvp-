<div class="auth-page">

  <!-- Left: Logo -->
  <div class="logo-side">
    <img src="assets/ope-logo.png" alt="OpE Logo" class="logo-img" />
  </div>

  <!-- Right: Form -->
  <div class="form-side">
    <div class="register-card">

      <h1 class="card-title">Sign Up</h1>
      <p class="card-subtitle">Find your dream car!</p>

      <!-- Full name -->
      <div class="input-wrapper">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </span>
        <input
          type="text"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="Full name"
          class="field-input"
        />
      </div>

      <!-- Email -->
      <div class="input-wrapper">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M3 7l9 6 9-6"/>
          </svg>
        </span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email address"
          class="field-input"
        />
      </div>

      <!-- Phone -->
      <div class="input-wrapper">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/>
          </svg>
        </span>
        <input
          type="tel"
          [(ngModel)]="phone"
          name="phone"
          placeholder="Phone number"
          class="field-input"
        />
      </div>

      <!-- Password -->
      <div class="input-wrapper">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          class="field-input"
        />
        <span class="input-icon-right" (click)="showPassword = !showPassword">
          <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>

      <button class="btn-primary" (click)="onRegister()">Sign Up</button>

      <div class="divider">
        <hr /><span>Or</span><hr />
      </div>

      <p class="link-social">Sign Up with</p>

      <p class="footer-text">
        Already have an account?
        <a routerLink="/login" class="link-accent">Sign In</a>
      </p>

    </div>
  </div>

</div>
