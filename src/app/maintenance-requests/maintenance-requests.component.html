<div class="page">
  <h1 class="page-title">Solicitudes de mantenimiento</h1>

  <!-- Search + Actions -->
  <div class="toolbar">
    <div class="search-group">
      <span class="search-label">Buscar solicitud</span>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" [(ngModel)]="searchTerm" placeholder="" class="search-input"/>
      </div>
    </div>
    <div class="action-btns">
      <button class="btn btn--green" (click)="openModal()">añadir</button>
      <button class="btn btn--red" (click)="deleteSelected()">eliminar</button>
    </div>
  </div>

  <!-- Request List -->
  <div class="request-list">
    <div class="request-item" *ngFor="let req of filtered">
      <div class="request-item__info">
        <p class="request-item__title">{{ req.title }}</p>
        <p class="request-item__desc">{{ req.description }}</p>
      </div>
      <div class="request-item__meta">
        <span class="request-item__status">Estado de reparacion</span>
        <span class="request-item__comment-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <label class="checkbox-wrap">
          <input type="checkbox" [(ngModel)]="req.checked" class="hidden-check"/>
          <span class="custom-check" [class.custom-check--active]="req.checked">
            <svg *ngIf="req.checked" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.2"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
          </span>
        </label>
      </div>
    </div>
    <div class="empty-state" *ngIf="filtered.length === 0">
      <p>No se encontraron solicitudes.</p>
    </div>
  </div>
</div>

<!-- ══════════ ADD MODAL ══════════ -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal__layout">

      <!-- Left column -->
      <div class="modal__left">
        <p class="modal__field-label">Titulo de Solicitud de mantenimiento</p>
        <input type="text" [(ngModel)]="newRequest.title" class="modal__input modal__input--pill" placeholder=""/>

        <p class="modal__field-label" style="margin-top:1.4rem;">Tipo de Falla</p>
        <select [(ngModel)]="newRequest.faultType" class="modal__select">
          <option *ngFor="let ft of faultTypes" [value]="ft">{{ ft }}</option>
        </select>

        <div class="modal__upload-row">
          <p class="modal__field-label">Subir imagenes</p>
          <label class="upload-btn">
            <input type="file" accept="image/*" (change)="onFileSelected($event)" hidden/>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </label>
          <span class="upload-name" *ngIf="selectedImageName">{{ selectedImageName }}</span>
        </div>
      </div>

      <!-- Right column -->
      <div class="modal__right">
        <p class="modal__field-label">Descripcion</p>
        <textarea [(ngModel)]="newRequest.description" class="modal__textarea" rows="7"></textarea>
      </div>

    </div>

    <!-- Modal actions -->
    <div class="modal__actions">
      <button class="modal__icon-btn" title="Añadir" (click)="saveRequest()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
      <button class="modal__icon-btn" title="Guardar" (click)="saveRequest()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button class="modal__icon-btn modal__icon-btn--red" title="Cancelar" (click)="closeModal()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>
  </div>
</div>
